{% extends 'accounts/base.html' %}

{% block title %}Login - ConnectX{% endblock %}

{% block extra_css %}
<style>
.card {
    background: #f7f7f7;
    padding: 35px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}
.form-group {
    margin-bottom: 20px;
}
.form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    color: #444;
}
.form-group input {
    width: 100%;
    padding: 12px 14px;
    border: none;
    border-radius: 10px;
    background: #e9edf5;
    font-size: 15px;
}
.form-group input:focus {
    outline: none;
    background: #dde3ee;
}
.btn-primary {
    background: linear-gradient(135deg, #667eea, #764ba2);
    border: none;
    border-radius: 30px;
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
    width: 100%;
    padding: 12px;
    font-size: 16px;
}
.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}
.alert-danger {
    background: #ffe5e5;
    color: #c0392b;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 15px;
}
</style>
{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 120px auto;">

    <div class="card">
        <h2 style="text-align: center; margin-bottom: 30px; color: #333;">🔐 Login to ConnectX</h2>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div style="position: relative; width: 100%;">
                    <input type="password" id="password" name="password" placeholder="Enter your password" required
                        style="width: 100%; padding-right: 40px;">

                    <span onclick="togglePassword()" style="
            position: absolute; 
            right: 10px; 
            top: 50%; 
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 18px;
        ">
                        👁
                    </span>
                </div>

            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; font-size: 16px;">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>

        <p style="text-align: center; margin-top: 20px; color: #666;">
            Don't have an account? <a href="{% url 'register' %}"
                style="color: #667eea; text-decoration: none; font-weight: 600;">Register here</a>
        </p>
    </div>
</div>
<script>
    function togglePassword() {
        const passwordField = document.getElementById("password");

        if (passwordField.type === "password") {
            passwordField.type = "text";
        } else {
            passwordField.type = "password";
        }
    }
</script>
{% endblock %}
