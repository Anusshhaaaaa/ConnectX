{% extends 'accounts/base.html' %}

{% block title %}Login - ConnectX{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 60px auto;">
    <div class="card">
        <h2 style="text-align: center; margin-bottom: 30px; color: #333;">🔐 Login to ConnectX</h2>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div style="position: relative; width: 100%;">
                    <input type="password" id="password" name="password" placeholder="Enter your password" required
                        style="width: 100%; padding-right: 40px;">

                    <span onclick="togglePassword()" style="
            position: absolute; 
            right: 10px; 
            top: 50%; 
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 18px;
        ">
                        👁
                    </span>
                </div>

            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; font-size: 16px;">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>

        <p style="text-align: center; margin-top: 20px; color: #666;">
            Don't have an account? <a href="{% url 'register' %}"
                style="color: #667eea; text-decoration: none; font-weight: 600;">Register here</a>
        </p>
    </div>
</div>
<script>
    function togglePassword() {
        const passwordField = document.getElementById("password");

        if (passwordField.type === "password") {
            passwordField.type = "text";
        } else {
            passwordField.type = "password";
        }
    }
</script>
{% endblock %}
